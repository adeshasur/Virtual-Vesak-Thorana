<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Vesak Thorana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scene" aria-hidden="true">
        <img src="assets/images/vesak-thorana-background.png" alt="" class="scene__image">
        <div class="stars"></div>
        <div class="lantern lantern--left"></div>
        <div class="lantern lantern--right"></div>
        <div class="lantern lantern--small"></div>
    </div>

    <header class="topbar">
        <div>
            <p class="eyebrow">Vesak 2026</p>
            <h1>Digital Vesak Thorana</h1>
        </div>
        <button class="music-toggle" id="musicToggle" type="button" aria-pressed="false">
            <span class="music-toggle__icon" aria-hidden="true">♪</span>
            <span id="musicLabel">Music Off</span>
        </button>
    </header>

    <main>
        <section class="intro" aria-labelledby="introTitle">
            <h2 id="introTitle">Experience the beauty of Vesak through lights, stories, and peace.</h2>
            <p>Click each illuminated panel to explore key moments from the life of the Buddha in a calm digital thorana experience.</p>
        </section>

        <section class="thorana-wrap" aria-label="Interactive Vesak thorana">
            <div class="thorana">
                <div class="dome">
                    <span class="flame"></span>
                    <span class="dome__ring"></span>
                    <span class="dome__ring dome__ring--inner"></span>
                </div>

                <div class="light-row light-row--top" aria-hidden="true"></div>

                <div class="arch">
                    <div class="arch__lights arch__lights--left" aria-hidden="true"></div>
                    <div class="arch__lights arch__lights--right" aria-hidden="true"></div>

                    <button class="story-panel story-panel--main" type="button" data-story="birth">
                        <span class="story-panel__number">01</span>
                        <span class="story-panel__title">සිද්ධාර්ථ කුමරුගේ උපත</span>
                    </button>

                    <div class="panel-grid">
                        <button class="story-panel" type="button" data-story="renunciation">
                            <span class="story-panel__number">02</span>
                            <span class="story-panel__title">මහබිනික්මන</span>
                        </button>
                        <button class="story-panel" type="button" data-story="enlightenment">
                            <span class="story-panel__number">03</span>
                            <span class="story-panel__title">බුද්ධත්වය ලැබීම</span>
                        </button>
                        <button class="story-panel" type="button" data-story="sermon">
                            <span class="story-panel__number">04</span>
                            <span class="story-panel__title">ධම්මචක්කප්පවත්තනය</span>
                        </button>
                        <button class="story-panel" type="button" data-story="parinibbana">
                            <span class="story-panel__number">05</span>
                            <span class="story-panel__title">පරිනිර්වාණය</span>
                        </button>
                    </div>
                </div>

                <div class="pillars" aria-hidden="true">
                    <div class="pillar"></div>
                    <div class="pillar"></div>
                </div>

                <div class="base">
                    <span>සදහම් ආලෝකය</span>
                </div>
            </div>
        </section>
    </main>

    <footer>
        Developed by Lucifer X | Vesak 2026
    </footer>

    <div class="modal" id="storyModal" role="dialog" aria-modal="true" aria-labelledby="storyTitle" aria-hidden="true">
        <div class="modal__backdrop" data-close-modal></div>
        <article class="modal__card">
            <button class="modal__close" id="closeModal" type="button" aria-label="Close story">×</button>
            <div class="modal__icon" id="storyIcon" aria-hidden="true">☸</div>
            <p class="modal__kicker" id="storyKicker"></p>
            <h2 id="storyTitle"></h2>
            <p id="storyDescription"></p>
            <div class="modal__actions">
                <button class="modal__nav" id="prevStory" type="button">Previous</button>
                <button class="modal__nav" id="nextStory" type="button">Next</button>
            </div>
        </article>
    </div>

    <script src="script.js"></script>
</body>
</html>
