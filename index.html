<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budu Siritha Digital Vesak Thorana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scene" aria-hidden="true">
        <img src="assets/images/vesak-thorana-background.png" alt="" class="scene__image">
        <div class="stars"></div>
        <div class="moon"></div>
        <div class="lantern lantern--left"></div>
        <div class="lantern lantern--right"></div>
        <div class="lantern lantern--small"></div>
    </div>

    <header class="topbar">
        <div>
            <p class="eyebrow">Vesak 2026</p>
            <h1>Budu Siritha Digital Vesak Thorana</h1>
        </div>
        <button class="music-toggle" id="musicToggle" type="button" aria-pressed="false">
            <span class="music-toggle__icon" aria-hidden="true">♪</span>
            <span id="musicLabel">Music Off</span>
        </button>
    </header>

    <main>
        <section class="intro" aria-labelledby="introTitle">
            <h2 id="introTitle">බුදු සිරිතේ ප්‍රධාන අවස්ථා ආලෝකයෙන් කියන ඩිජිටල් තොරණ.</h2>
            <p>Click each illuminated panel to explore seven respectful story scenes from the life of the Buddha.</p>
        </section>

        <section class="thorana-wrap" aria-label="Interactive Vesak thorana">
            <div class="thorana thorana--image-stage">
                <img src="assets/images/realistic-thorana-stage-transparent.png" alt="Realistic Digital Vesak Thorana" class="real-thorana-image">
                <div class="live-light live-light--arch" aria-hidden="true"></div>
                <div class="live-light live-light--halo" aria-hidden="true"></div>
                <div class="live-light live-light--base" aria-hidden="true"></div>
                <div class="spark-field" aria-hidden="true"></div>
                <div class="hotspot-layer" aria-label="Story panels">
                    <button class="story-panel hotspot hotspot--birth" type="button" data-story="birth">
                        <span class="story-panel__number">01</span>
                        <span class="story-panel__title">උපත</span>
                    </button>
                    <button class="story-panel hotspot hotspot--four-sights" type="button" data-story="four-sights">
                        <span class="story-panel__number">02</span>
                        <span class="story-panel__title">හතර දර්ශන</span>
                    </button>
                    <button class="story-panel hotspot hotspot--renunciation" type="button" data-story="renunciation">
                        <span class="story-panel__number">03</span>
                        <span class="story-panel__title">මහබිනික්මන</span>
                    </button>
                    <button class="story-panel hotspot hotspot--austerities" type="button" data-story="austerities">
                        <span class="story-panel__number">04</span>
                        <span class="story-panel__title">දුෂ්කර ක්‍රියා</span>
                    </button>
                    <button class="story-panel hotspot hotspot--enlightenment" type="button" data-story="enlightenment">
                        <span class="story-panel__number">05</span>
                        <span class="story-panel__title">බුද්ධත්වය</span>
                    </button>
                    <button class="story-panel hotspot hotspot--sermon" type="button" data-story="sermon">
                        <span class="story-panel__number">06</span>
                        <span class="story-panel__title">පළමු දේශනාව</span>
                    </button>
                    <button class="story-panel hotspot hotspot--parinibbana" type="button" data-story="parinibbana">
                        <span class="story-panel__number">07</span>
                        <span class="story-panel__title">පරිනිර්වාණය</span>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        © 2025 Adheesha Sooriyaarachchi.
        <br>
        CodaWix™
    </footer>

    <div class="modal" id="storyModal" role="dialog" aria-modal="true" aria-labelledby="storyTitle" aria-hidden="true">
        <div class="modal__backdrop" data-close-modal></div>
        <article class="modal__card">
            <button class="modal__close" id="closeModal" type="button" aria-label="Close story">×</button>
            <div class="modal__visual" id="storyVisual" aria-hidden="true">
                <img src="assets/images/story-birth.png" alt="" id="storyImage" class="modal__image">
                <span class="modal__icon" id="storyIcon">☸</span>
            </div>
            <p class="modal__kicker" id="storyKicker"></p>
            <h2 id="storyTitle"></h2>
            <p id="storyDescription"></p>
            <div class="modal__actions">
                <button class="modal__nav modal__nav--speak" id="speakStory" type="button">Narration</button>
                <button class="modal__nav" id="prevStory" type="button">Previous</button>
                <button class="modal__nav" id="nextStory" type="button">Next</button>
            </div>
        </article>
    </div>

    <script src="script.js"></script>
</body>
</html>
